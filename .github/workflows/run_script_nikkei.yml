name: スクリプトを実行する(日経)

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * 1-5'
    - cron: '0 3 * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '0 11 * * 1-5'

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: '3.10'

      - name: 依存関係のインストール
        run: uv sync --frozen

      - name: リポジトリ内のPythonファイルを実行
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run python main.py "${BLUESKY_HANDLE}" "${BLUESKY_PASSWORD}" "${GEMINI_API_KEY}" nikkei
