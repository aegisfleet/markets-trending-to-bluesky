name: スクリプトを実行する(みんかぶ)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: read
  actions: write

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 前回の成果物をダウンロード
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          name: artifact
          path: ${{ runner.temp }}/artifacts
          if_no_artifact_found: ignore

      - name: 成果物を配置
        run: |
          mkdir -p tmp
          if [ -f "${{ runner.temp }}/artifacts/previous_result.txt" ]; then
            cp "${{ runner.temp }}/artifacts/previous_result.txt" tmp/previous_result.txt
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.10

      - name: 依存関係のインストール
        run: uv sync --frozen

      - name: リポジトリ内のPythonファイルを実行
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: uv run python main.py "${BLUESKY_HANDLE}" "${BLUESKY_PASSWORD}" "${GEMINI_API_KEY}" minkabu

      - name: 成果物をアップロード
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifact
          path: tmp/
          retention-days: 10
