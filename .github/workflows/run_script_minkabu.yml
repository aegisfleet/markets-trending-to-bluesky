name: スクリプトを実行する(みんかぶ)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: read
  actions: write

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v6

      - name: 前回の成果物をダウンロード
        uses: dawidd6/action-download-artifact@v21
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          name: artifact
          path: ${{ runner.temp }}/artifacts
          if_no_artifact_found: ignore

      - name: 成果物を配置
        run: |
          mkdir -p tmp
          if [ -f "${{ runner.temp }}/artifacts/previous_result.txt" ]; then
            cp "${{ runner.temp }}/artifacts/previous_result.txt" tmp/previous_result.txt
          fi

      - name: Pythonの実行環境をセットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 依存関係のインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: リポジトリ内のPythonファイルを実行
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: python main.py "${BLUESKY_HANDLE}" "${BLUESKY_PASSWORD}" "${GEMINI_API_KEY}" minkabu

      - name: 成果物をアップロード
        uses: actions/upload-artifact@v7
        with:
          name: artifact
          path: tmp/
          retention-days: 10
